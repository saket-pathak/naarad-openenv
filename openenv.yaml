spec_version: 1.0

name: naarad-openenv
description: AI environment for prioritizing citizen complaints
version: 1.0.0

entry_point: env.complaint_env:ComplaintEnv

tasks:
  - id: easy
    path: tasks/easy.json
    grader: env.grader:grade_prediction

  - id: medium
    path: tasks/medium.json
    grader: env.grader:grade_prediction

  - id: hard
    path: tasks/hard.json
    grader: env.grader:grade_prediction

actions:
  - low
  - medium
  - high
  - critical

observation_space:
  type: text

reward_range: [0.01, 0.99]