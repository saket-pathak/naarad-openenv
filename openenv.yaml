name: naarad-openenv
description: AI environment for prioritizing citizen complaints using structured rewards and contextual grading
version: 1.0.0

entry_point: server.environment:ComplaintEnvironment

observation:
  type: object
  fields:
    text: string

action:
  type: object
  fields:
    priority:
      type: string
      enum: [low, medium, high, critical]

reward_range: [0.01, 0.99]